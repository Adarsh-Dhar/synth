description: Agentia generated bot evals
prompts:
  - |
    Build a Solana {{strategy}} bot.
    Requirements:
    - Never use child_process, execSync, or jupiter-cli
    - Use BigInt for monetary values
    - No hardcoded addresses, read from env
    - MUST use the MCP bridge (callMcpTool) for all Jupiter swaps.
    {{#if paymentRequested}}
    - Include a payment webhook handler for profit split events utilizing callMcpTool
    {{/if}}
providers:
  - id: openai:gpt-4o-mini
    config:
      apiKey: ${OPENAI_API_KEY}
tests:
  - vars:
      strategy: arbitrage
      paymentRequested: false
    assert:
      - type: contains
        value: 'callMcpTool("jupiter", "execute_swap"'
      - type: not-contains
        value: axios
      - type: not-contains
        value: quote-api.jup.ag
      - type: not-contains
        value: execSync
      - type: contains
        value: BigInt
  - vars:
      strategy: arbitrage
      paymentRequested: true
    assert:
      - type: contains
        value: '/payment/webhook'
      - type: contains
        value: 'callMcpTool("jupiter", "execute_swap"'
