name: agents-tests

on:
  pull_request:
    paths:
      - 'agents/**'
      - '.github/workflows/agents-tests.yml'
  workflow_dispatch:

jobs:
  agents-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx python-dotenv pydantic json-repair requests

      - name: Run Phase 1 RAG tests
        run: |
          PYTHONPATH=agents pytest -q agents/tests/test_orchestrator_rag.py

      - name: Run Phase 3 rubric checks
        run: |
          python agents/tests/eval/judge_rubric.py --file agents/tests/eval/fixtures/arbitrage_bot.ts
          python agents/tests/eval/judge_rubric.py --file agents/tests/eval/fixtures/yield_sweeper_bot.ts
          python agents/tests/eval/judge_rubric.py --file agents/tests/eval/fixtures/profit_splitting_bot.ts --dodo-requested

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Optional Promptfoo evals
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          npm install -g promptfoo
          promptfoo eval -c agents/tests/eval/promptfoo.yaml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Phase 2 syntax check (best-effort)
        continue-on-error: true
        run: |
          chmod +x agents/tests/test_syntax_check.sh
          bash agents/tests/test_syntax_check.sh
